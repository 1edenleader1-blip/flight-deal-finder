name: Weekly Flight Deal Search

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  search-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt
- name: Debug secrets presence
        env:
          DUFFEL_API_KEY: ${{ secrets.DUFFEL_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "DUFFEL_API_KEY length: ${#DUFFEL_API_KEY}"
          echo "GMAIL_ADDRESS length: ${#GMAIL_ADDRESS}"
          echo "GMAIL_APP_PASSWORD length: ${#GMAIL_APP_PASSWORD}"
        run: python main.py

