# ============================================================
# Flight Deal Finder — configuration
# ============================================================
# Edit this file to define WHAT to search for and WHERE to send
# results. You can define multiple "saved searches" — each one
# is a route + date rule that gets searched and reported every
# week. Sensitive values (Travelpayouts token, Gmail app
# password) do NOT go here — they're set as GitHub Secrets (see
# README.md).
# ============================================================

email:
  # Address the email will be sent FROM (must match the Gmail
  # account you generated the app password for).
  from_address: "your-gmail-address@gmail.com"

  # Who receives the weekly summary. Add as many as you like.
  recipients:
    - "you@example.com"

  subject_prefix: "✈️ Weekly Flight Deals"

defaults:
  currency: "USD"           # ISO currency code prices are shown in
  results_per_search: 5     # how many top itineraries to show per saved search
  search_window_days: 365   # how far ahead to look for cheap dates

# ------------------------------------------------------------
# Saved searches. Add/remove/edit as many blocks as you want.
# Any field you omit falls back to the value in `defaults` above.
# ------------------------------------------------------------
searches:
  - name: "Auckland to Tokyo"
    origin: "AKL"          # IATA airport/city code
    destination: "NRT"     # IATA airport/city code
    nights:
      min: 6
      max: 9

  - name: "Auckland to Bali"
    origin: "AKL"
    destination: "DPS"
    nights:
      min: 7
      max: 14
    currency: "NZD"

  # Add more blocks like this for additional routes:
  # - name: "Auckland to Sydney"
  #   origin: "AKL"
  #   destination: "SYD"
  #   nights:
  #     min: 3
  #     max: 5
